<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashi's Typing Analyzer - Executive Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0d1117; --card-bg: #161b22; --accent-glow: #58a6ff;
            --text-main: #c9d1d9; --text-muted: #8b949e; --success: #3fb950;
            --gold: #d4af37;
        }
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .project-box {
            background: var(--card-bg); border: 1px solid #30363d;
            border-radius: 16px; padding: 30px; width: 100%; max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header-container { text-align: center; margin-bottom: 25px; }
        .logo-class { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-glow); margin-bottom: 10px; }
        .title-glow { color: var(--accent-glow); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .name-entry-box { border: 1px solid var(--gold); border-radius: 10px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .name-entry-box input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; }
        
        .setup-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .custom-select { background: #0d1117; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-box label { display: block; font-size: 10px; color: var(--text-muted); }
        .stat-box span { font-size: 20px; font-weight: 800; color: var(--accent-glow); }

        #display-area { background: #000; padding: 20px; border-radius: 10px; font-size: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent-glow); }
        .type-input { width: 100%; height: 80px; background: #0d1117; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; font-size: 18px; outline: none; }
        
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .download-btn { background: var(--gold); color: #000; margin-right: 10px; }
        .restart-btn { background: #444; color: white; }

        /* --- CERTIFICATE STYLING (Fixed for PDF) --- */
        #cert-hidden-container { position: absolute; left: -9999px; top: 0; }
        #pdf-wrap { 
            width: 800px; 
            height: 560px; 
            background: #ffffff; 
            padding: 30px; 
            box-sizing: border-box;
        }
        #pdf-content {
            border: 10px double #1e293b;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            text-align: center;
            color: #1e293b;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }
        .ref-id { position: absolute; top: 15px; right: 20px; font-family: monospace; font-size: 10px; color: #64748b; }
        .cert-header h1 { font-size: 32px; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .cert-name { font-family: 'Dancing Script', cursive; font-size: 48px; border-bottom: 2px solid #e2e8f0; min-width: 300px; margin: 10px 0; }
        .cert-metrics { display: flex; justify-content: center; gap: 40px; background: #f8fafc; padding: 15px 40px; border-radius: 10px; }
        .metric-val { font-size: 28px; font-weight: 800; display: block; }
        .metric-label { font-size: 11px; text-transform: uppercase; color: #64748b; }
        .success { color: var(--success); }
        .fail { color: #f85149; }
    </style>
</head>
<body>

<div class="project-box">
    <div class="header-container">
        <img src="logo.png" class="logo-class" onerror="this.src='https://via.placeholder.com/80?text=S'">
        <h2 class="title-glow">Performance Analyzer</h2>
    </div>

    <div class="name-entry-box">
        <label>Name for Certificate:</label>
        <input type="text" id="user-name" placeholder="Enter full name...">
    </div>

    <div class="setup-row">
        <select id="diff-config" class="custom-select">
            <option value="easy">Level: Associate</option>
            <option value="medium" selected>Level: Professional</option>
            <option value="hard">Level: Expert</option>
        </select>
        <select id="time-config" class="custom-select">
            <option value="30">30s</option>
            <option value="60" selected>60s</option>
        </select>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><label>Time</label><span id="live-timer">60s</span></div>
        <div class="stat-box"><label>WPM</label><span id="live-wpm">0</span></div>
        <div class="stat-box"><label>Accuracy</label><span id="live-acc">0%</span></div>
        <div class="stat-box"><label>Best</label><span id="best-wpm">0</span></div>
    </div>

    <div id="display-area">Ready to test your speed? Start typing below.</div>
    <textarea id="typing-box" class="type-input" placeholder="Start typing here..."></textarea>

    <div id="btn-container" style="text-align: center;">
        <button class="btn restart-btn" onclick="location.reload()">New Session</button>
    </div>
</div>

<div id="cert-hidden-container">
    <div id="pdf-wrap">
        <div id="pdf-content">
            <div class="ref-id">REF ID: <span id="pdf-ref"></span></div>
            <div class="cert-header">
                <h1>Certificate of Competency</h1>
                <p style="color: #d4af37; font-weight: bold; margin: 5px 0;">Official Typing Performance Record</p>
            </div>
            <div>
                <p style="margin-bottom: 5px;">This document certifies that</p>
                <div id="cert-display-name" class="cert-name">Candidate</div>
                <p style="margin-top: 5px;">has successfully completed the standardized evaluation.</p>
            </div>
            <div class="cert-metrics">
                <div><span class="metric-label">WPM</span><span id="cert-wpm" class="metric-val">0</span></div>
                <div><span class="metric-label">Accuracy</span><span id="cert-acc" class="metric-val">0%</span></div>
                <div><span class="metric-label">Skill Tier</span><span id="cert-diff" class="metric-val">PRO</span></div>
            </div>
            <div>
                <p id="cert-date" style="font-weight: bold; margin: 0;"></p>
                <p class="metric-label">Issuance Date</p>
            </div>
        </div>
    </div>
</div>

<script>
    const quotes = {
        easy: ["The sun is very bright.", "I love to write code."],
        medium: ["The best way to predict the future is to create it.", "Success is not final, failure is not fatal."],
        hard: ["Linguistic diversity reflects the rich cultural heritage of civilizations."]
    };

    let timer, timeRemaining, isStarted = false;

    function startTest() {
        isStarted = true;
        timeRemaining = parseInt(document.getElementById('time-config').value);
        document.getElementById('diff-config').disabled = true;
        
        timer = setInterval(() => {
            timeRemaining--;
            document.getElementById('live-timer').innerText = timeRemaining + "s";
            if(timeRemaining <= 0) {
                clearInterval(timer);
                finishTest();
            }
        }, 1000);
    }

    function validate() {
        const text = document.getElementById('display-area').innerText;
        const input = document.getElementById('typing-box').value;
        const words = input.trim().split(/\s+/).length;
        const elapsed = (parseInt(document.getElementById('time-config').value) - timeRemaining) / 60 || 0.01;
        
        document.getElementById('live-wpm').innerText = Math.round(words / elapsed);
        // Simplified accuracy logic for this fix
        let correct = 0;
        for(let i=0; i<input.length; i++) { if(input[i] === text[i]) correct++; }
        document.getElementById('live-acc').innerText = Math.round((correct / (input.length || 1)) * 100) + "%";
    }

    document.getElementById('typing-box').addEventListener('input', () => {
        if(!isStarted) startTest();
        validate();
    });

    function finishTest() {
        document.getElementById('typing-box').disabled = true;
        const wpm = document.getElementById('live-wpm').innerText;
        const acc = document.getElementById('live-acc').innerText;
        const diff = document.getElementById('diff-config').value.toUpperCase();

        // Update Hidden Certificate
        document.getElementById('pdf-ref').innerText = 'SV-' + Math.floor(Math.random()*899999 + 100000);
        document.getElementById('cert-display-name').innerText = document.getElementById('user-name').value || 'Candidate';
        document.getElementById('cert-wpm').innerText = wpm;
        document.getElementById('cert-acc').innerText = acc;
        document.getElementById('cert-diff').innerText = diff;
        document.getElementById('cert-date').innerText = new Date().toLocaleDateString();

        const dlBtn = document.createElement('button');
        dlBtn.className = 'btn download-btn';
        dlBtn.innerText = 'DOWNLOAD CERTIFICATE';
        dlBtn.onclick = () => {
            const element = document.getElementById('pdf-wrap');
            html2pdf().set({
                margin: 0,
                filename: 'Typing_Certificate.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'px', format: [800, 560], orientation: 'landscape' }
            }).from(element).save();
        };
        document.getElementById('btn-container').prepend(dlBtn);
    }
</script>
</body>
</html>
