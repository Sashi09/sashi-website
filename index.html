<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Analyzer - Improved</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0d1117;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
}

.container {
    width:90%;
    max-width:800px;
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:none;
}

.stats {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.box {
    background:#161b22;
    padding:10px;
    text-align:center;
}

#display-area span.correct { color:lime; }
#display-area span.wrong { color:red; }

button {
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Typing Analyzer</h2>

<input type="text" id="user-name" placeholder="Enter your name">

<select id="time-config">
<option value="30">30 sec</option>
<option value="60" selected>60 sec</option>
</select>

<div class="stats">
<div class="box">Time <br><span id="timer">60</span></div>
<div class="box">WPM <br><span id="wpm">—</span></div>
<div class="box">Accuracy <br><span id="acc">—</span></div>
<div class="box">Best <br><span id="best">—</span></div>
</div>

<div id="display-area"></div>

<textarea id="typing-box" placeholder="Start typing..."></textarea>

<canvas id="chart"></canvas>

<button onclick="location.reload()">Restart</button>

</div>

<script>
const sentences = [
"The quick brown fox jumps over the lazy dog",
"Typing fast requires consistent practice and focus",
"JavaScript makes web applications interactive",
"Accuracy is more important than speed at first"
];

let timer, timeLeft, totalTime;
let started = false;

let scores = JSON.parse(localStorage.getItem("scores")) || [];

const typingBox = document.getElementById("typing-box");
typingBox.addEventListener("paste", e => e.preventDefault());

function loadSentence() {
    const text = sentences[Math.floor(Math.random()*sentences.length)];
    document.getElementById("display-area").innerHTML =
        text.split("").map(c=>`<span>${c}</span>`).join("");
}

function startTest() {
    started = true;
    totalTime = parseInt(document.getElementById("time-config").value);
    timeLeft = totalTime;

    timer = setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        updateChart();

        if(timeLeft<=0){
            clearInterval(timer);
            endTest();
        }
    },1000);
}

typingBox.addEventListener("input", ()=>{
    if(!started && typingBox.value.length>0) startTest();
    if(started) checkTyping();
});

function checkTyping(){
    const spans = document.querySelectorAll("#display-area span");
    const typed = typingBox.value.split("");

    let correct = 0;

    spans.forEach((s,i)=>{
        if(typed[i]==null){
            s.className="";
        }
        else if(typed[i]===s.innerText){
            s.className="correct";
            correct++;
        } else {
            s.className="wrong";
        }
    });

    let elapsed = (totalTime - timeLeft)/60;
    if(elapsed<=0) elapsed = 1/60;

    const wpm = Math.round((typed.length/5)/elapsed);
    document.getElementById("wpm").innerText = wpm;

    const acc = Math.round((correct/spans.length)*100);
    document.getElementById("acc").innerText = acc+"%";
}

function endTest(){
    typingBox.disabled = true;

    const name = document.getElementById("user-name").value.trim();
    if(!name){
        alert("Enter name!");
        return;
    }

    const finalWpm = parseInt(document.getElementById("wpm").innerText);
    const finalAcc = document.getElementById("acc").innerText;

    scores.unshift({wpm:finalWpm, acc:finalAcc});
    scores.sort((a,b)=>b.wpm-a.wpm);
    scores = scores.slice(0,5);

    localStorage.setItem("scores",JSON.stringify(scores));

    document.getElementById("best").innerText = scores[0].wpm;

    document.getElementById("display-area").innerHTML =
        "<h3>Test Completed 🎉</h3>";
}

let chart;
function initChart(){
    const ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx,{
        type:"line",
        data:{labels:[],datasets:[{data:[]}]}
    });
}

function updateChart(){
    chart.data.labels.push(totalTime-timeLeft);
    chart.data.datasets[0].data.push(
        parseInt(document.getElementById("wpm").innerText) || 0
    );
    chart.update();
}

window.onload = ()=>{
    loadSentence();
    initChart();
    typingBox.focus();

    if(scores.length>0){
        document.getElementById("best").innerText = scores[0].wpm;
    }
};
</script>

</body>
</html>
